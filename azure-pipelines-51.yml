# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:

- task: CavAITestCaseTask@1
  inputs:
    cavConnection: 'cav-ai-test-demo'
    workspaceRoot: '/home/cavisson/work'
    project: 'default'
    subProject: 'default'
    numberOfTestCases: '1'
    controllerName: 'work'
    userName: 'cavisson'
    prdSourceType: 'LOCAL'
    prdFile: '/var/jenkins_home/workspace/test5'
