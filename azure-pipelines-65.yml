trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- bash: |
    set -x
    nc -vz -w 10 10.10.10.115 4444
    curl -vk --connect-timeout 10 https://10.10.10.115:4444/
  displayName: Test Cavisson connectivity
- task: CavAITestCaseDevAdoV9@1
  inputs:
    serviceConnection: 'cav-ai-demo-test'
    applicationUrl: 'http://66.220.31.130:31528/'
    workspaceRoot: '/home/cavisson/work'
    project: 'default'
    subProject: 'default'
    controllerName: 'work'
    numberOfTestCases: '1'
    prdSourceType: 'JIRA'
    jiraEpicPattern: 'EM-572'
    jiraIntegrationName: 'JIRA_CONFIG_TEST'